<html>
<head>
    <link rel="stylesheet" th:href="@{/common.css}">
</head>
<body>
<form th:action="${url}" th:object="${request}" method="post">
    <div>
        <!--<input type="text" name="id" placeholder="아이디">-->
        아이디 <input type="text" th:field="*{userId}">
        <!--<p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}">-->
    </div>
    <div>
        비밀번호 <input type="password" th:field="*{password}">
       <!-- <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>-->
    </div>
    <div>
        회원유형
        <span th:each="type : ${list_userTypes}">
            <label>
                <!-- name : dto 필드명-->
                <input type="radio"
                    name="type"
                    th:value="${type}" th:checked="${request.type == type}"/>
                <span th:text="#{${'userType.' + type.name()}}"></span>
            </label>
        </span>
        <!-- TODO : 보호소 계정일 경우 보호소 목록 출력-->
        <div id="optional_display_shelter" class="display_hidden">
            <select name="shelter_id">
                <option value="">보호소 선택</option>
                <th:block th:each="shelter : ${list_shelter}">
                    <option th:value="${shelter.id}"
                            th:text="${shelter.name}"
                            th:selected="${request.shelter_id == shelter.id}">
                    </option>
                </th:block>
            </select>
        </div>
    </div>
    <p id="errorMsg" th:if="${errorMsg}"  th:text="${errorMsg}"></p>
    <div>
        <button type="submit">회원가입</button>
    </div>
</form>

<script>
    const errorMsg = document.getElementById("errorMsg");
    const shelterArea = document.getElementById("optional_display_shelter");
    const isUserTypeChecked = document.querySelector('input[name="type"]:checked');

    if (isUserTypeChecked) {
        updateShelterUI(isUserTypeChecked.value);
    }

    function updateShelterUI(value) {
        if (value !== "SHELTER" && errorMsg) {
            errorMsg.innerText = "";
        }
        shelterArea.classList.toggle("display_hidden", value !== "SHELTER");
    }

    document.querySelectorAll('input[name="type"]').forEach(radio => {
        radio.addEventListener("change", function () {
            updateShelterUI(this.value);
        });
    });
</script>
</body>
</html>

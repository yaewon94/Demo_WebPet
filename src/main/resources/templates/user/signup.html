<html>
<body>

<!--
<form action="/signup" method="post">
-->
<form th:action="${url}" th:object="${createUserRequest}" method="post">
    <div>
        <!--<input type="text" name="id" placeholder="아이디">-->
        아이디 <input type="text" th:field="*{userId}">
        <!--<p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}">-->
    </div>
    <div>
        비밀번호 <input type="password" th:field="*{password}">
       <!-- <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>-->
    </div>
    <div>
        회원유형
        <span th:each="type : ${list_userTypes}">
            <label>
                <!-- name : dto 필드명-->
                <input type="radio"
                    name="type"
                    th:value="${type}"/>
                <span th:text="#{${'userType.' + type.name()}}"></span>
            </label>
        </span>
    </div>

    <p th:if="${errorMsg}"  th:text="${errorMsg}"></p>
    <button type="submit">회원가입</button>
</form>
</body>
</html>

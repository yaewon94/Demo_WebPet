<html>
<body>
<form th:action="${url}" th:object="${request}" method="post">
    <div>
        아이디 <input type="text" th:field="*{user_name}">
    </div>
    <div>
        비밀번호 <input type="password" th:field="*{password}">
    </div>

    <p th:if="${errorMsg}"  th:text="${errorMsg}"></p>
    <button type="submit">로그인</button>
    <div>
        <!-- th:field는 name이 없어도 되지만, th:value는 name이 있어야 함 -->
        <input type="hidden" name="redirect" th:value="${redirect}">
    </div>
</form>
</body>
</html>

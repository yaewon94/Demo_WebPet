<!-- 유저 버튼 패널 -->
<th:block th:fragment="user_panel">
    <div th:if="${loginUser == null}">
        <a th:href="${url_login}">로그인</a>
        <a th:href="${url_signup}">회원가입</a>
    </div>
    <div th:unless="${loginUser == null}">
        <b th:text="${loginUser.user_name}"></b>님 로그인
        <form th:action="${url_logout}" method="post">
            <button type="submit">
                로그아웃
            </button>
        </form>
    </div>
</th:block>
